<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>TermDock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bootstrap-bg, #151515);
      }

      body {
        overflow: hidden;
        color-scheme: var(--bootstrap-color-scheme, dark);
      }
    </style>
    <script>
      (() => {
        const searchParams = new URLSearchParams(window.location.search)
        const queryTheme = searchParams.get('theme')
        const queryLocale = searchParams.get('locale')
        const storedTheme = window.localStorage.getItem('termdock.theme')
        const storedLocale = window.localStorage.getItem('termdock.locale')
        const theme = queryTheme === 'default-light' || queryTheme === 'default-dark'
          ? queryTheme
          : storedTheme === 'default-light' || storedTheme === 'default-dark'
            ? storedTheme
            : 'default-dark'
        const locale = queryLocale === 'enUS' || queryLocale === 'zhCN'
          ? queryLocale
          : storedLocale === 'enUS' || storedLocale === 'zhCN'
            ? storedLocale
            : 'zhCN'
        const background = theme === 'default-light' ? '#f8fafc' : '#151515'
        const colorScheme = theme === 'default-light' ? 'light' : 'dark'

        document.documentElement.dataset.theme = theme
        document.documentElement.lang = locale === 'enUS' ? 'en' : 'zh-CN'
        document.documentElement.style.setProperty('--bootstrap-bg', background)
        document.documentElement.style.setProperty('--bootstrap-color-scheme', colorScheme)
        document.documentElement.style.backgroundColor = background
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/renderer/main.tsx"
    ></script>
  </body>
  </html>
