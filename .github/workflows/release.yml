name: Release

on:
  push:
    tags:
      - 'v*-beta*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [arm64, x64]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer + main
        run: npm run build -w @termdock/desktop

      - name: Package macOS (${{ matrix.arch }})
        run: |
          cd apps/desktop
          npx electron-builder --mac --${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: TermDock-macOS-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip

  build-win:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer + main
        run: npm run build -w @termdock/desktop

      - name: Package Windows (${{ matrix.arch }})
        run: |
          cd apps/desktop
          npx electron-builder --win --${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: TermDock-Windows-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.exe

  release:
    needs: [build-mac, build-win]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          files: |
            **/*.dmg
            **/*.zip
            **/*.exe
